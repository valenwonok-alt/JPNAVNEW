const SITE_URL='https://JPNAV.pages.dev';
function setMetaTag(selector, attr, value){
  let el=document.querySelector(selector);
  if(!el)return;
  el.setAttribute(attr,value||'');
}
function setJsonLd(data){
  const el=document.getElementById('seoJsonLd');
  if(el)el.textContent=JSON.stringify(data);
}
function findFeedItem(code){
  const c=normalizeCode(code);
  return DEMO_FEED.find(x=>normalizeCode(x.code)===c)||null;
}
function updateSeo(code, data){
  const isPost=!!code;
  const clean=isPost?normalizeCode(code):'';
  const feedItem=isPost?findFeedItem(clean):null;
  const title=isPost?`${clean} - ${PROFILE.siteName}`:PROFILE.siteName;
  const desc=isPost?`Buka postingan ${clean} di ${PROFILE.siteName}. Lihat gallery gambar dan tombol video berdasarkan CODE ${clean}.`:`${PROFILE.siteName} - cari postingan berdasarkan CODE, gallery gambar, dan video.`;
  const url=isPost?`${SITE_URL}/p/${encodeURIComponent(clean)}`:`${SITE_URL}/`;
  const image=(data&&((data.images&&data.images[0])||data.thumbnail))||(feedItem&&feedItem.cover)||PROFILE.avatar||PROFILE.logo||'';
  document.title=title;
  let descEl=document.querySelector('meta[name="description"]');
  if(descEl)descEl.setAttribute('content',desc);
  setMetaTag('#canonicalLink','href',url);
  setMetaTag('#ogTitle','content',title); setMetaTag('#ogDescription','content',desc); setMetaTag('#ogUrl','content',url); setMetaTag('#ogImage','content',image);
  setMetaTag('#twitterTitle','content',title); setMetaTag('#twitterDescription','content',desc); setMetaTag('#twitterImage','content',image);
  setJsonLd(isPost?{
    '@context':'https://schema.org','@type':'WebPage','name':title,'description':desc,'url':url,'image':image,
    'isPartOf':{'@type':'WebSite','name':PROFILE.siteName,'url':SITE_URL+'/'},
    'breadcrumb':{'@type':'BreadcrumbList','itemListElement':[
      {'@type':'ListItem','position':1,'name':'Home','item':SITE_URL+'/'},
      {'@type':'ListItem','position':2,'name':clean,'item':url}
    ]}
  }:{'@context':'https://schema.org','@type':'WebSite','name':PROFILE.siteName,'url':SITE_URL+'/','potentialAction':{'@type':'SearchAction','target':SITE_URL+'/p/{search_term_string}','query-input':'required name=search_term_string'}});
}
function renderSeoLinks(posts){
  const sample=(posts||[]).slice(0,120).map(p=>`<a href="/p/${encodeURIComponent(normalizeCode(p.code))}">${normalizeCode(p.code)}</a>`).join('');
  return `<section class="seo-links"><h2>Latest Codes</h2><p><a href="/all-codes.html">Lihat semua kode</a></p><div>${sample}</div></section>`;
}

const DEMO_FEED = (window.DEMO_FEED || window.FEED_DATA || []).map(item => {
  if (Array.isArray(item)) {
    const [code, cover] = item;
    return { code, caption: code, cover };
  }
  return {
    code: item.code,
    caption: item.caption || item.code,
    cover: item.cover || item.image || item.thumbnail || ''
  };
});
let currentPost=null,currentIndex=0;
function setMeta(){document.title=PROFILE.siteName||'JPNAV';const fav=document.getElementById('faviconLink');fav.href=PROFILE.favicon||PROFILE.avatar||'';renderBrand('sideBrand');renderBrand('topBrand')}
function renderBrand(id){const el=document.getElementById(id);if(PROFILE.logo){el.innerHTML=`<img class="brand-logo" src="${PROFILE.logo}" alt="${PROFILE.siteName}">`}else{el.innerHTML=`<span class="brand-text">${PROFILE.siteName}</span>`}}
function api(path){return (PROFILE.apiBase||'/api')+path}
function normalizeCode(s){return (s||'').trim().toUpperCase().replace(/\s+/g,'-')}
function avatarHtml(cls=''){return PROFILE.avatar?`<img src="${PROFILE.avatar}" alt="${PROFILE.username}">`:`<div class="avatar-fallback">${(PROFILE.siteName||'J')[0]}</div>`}
function route(){const path=location.pathname;const m=path.match(/^\/p\/([^/]+)/); if(m)return renderPost(decodeURIComponent(m[1])); renderHome()}
function shuffleArray(array){
 const arr=[...array];
 for(let i=arr.length-1;i>0;i--){
   const j=Math.floor(Math.random()*(i+1));
   [arr[i],arr[j]]=[arr[j],arr[i]];
 }
 return arr;
}

</div>
<div class="tabs">

<div class="grid" id="grid"><div class="empty">Memuat feed Telegram...</div></div>`;

async function renderPost(code){
 const page=document.getElementById('page');
 page.innerHTML=`<div class="postpage"><article class="post"><div class="post-head"><div class="mini-avatar">${avatarHtml()}</div><div><b>${PROFILE.username}</b><br><small style="color:var(--muted)">${normalizeCode(code)}</small></div></div><div class="post-media"><div class="loader"></div></div><div class="actions"><div class="icons"><span class="ico">♡</span><span class="ico">💬</span><span class="ico">↗</span></div><span class="ico">🔖</span></div><div class="caption"><b>${PROFILE.username}</b> Memuat postingan...</div><div class="comment">Komentar...</div></article></div>`;
 let data=null;
 try{
   const r=await fetch(api('/search?code='+encodeURIComponent(normalizeCode(code))));
   if(r.ok)data=normalizeMovieData(await r.json(), code);
 }catch(e){}
 if(!data||!data.images||!data.images.length){
   try{
     const r2=await fetch(api('/api/detail/'+encodeURIComponent(normalizeCode(code))));
     if(r2.ok)data=normalizeMovieData(await r2.json(), code);
   }catch(e){}
 }
 if(!data||!data.images||!data.images.length){data={code:normalizeCode(code),title:'Gambar tidak ditemukan '+normalizeCode(code),studio:'',images:[],embed:api('/embed?code='+encodeURIComponent(normalizeCode(code)))}}
 currentPost=data;currentIndex=0;drawPost()
}

function normalizeMovieData(json, code){
 const m=json&&json.movie?json.movie:json;
 if(!m)return null;
 const images=m.images||m.gallery||(m.thumbnail?[m.thumbnail]:[]);
 return {
   code:normalizeCode(m.code||code),
   title:m.title||'',
   studio:m.studio||'',
   actress:m.actress||'',
   thumbnail:m.thumbnail||images[0]||'',
   images:Array.isArray(images)?images.filter(Boolean):[],
   embed:m.embed||api('/embed?code='+encodeURIComponent(normalizeCode(m.code||code)))
 };
}
function renderAds(){
 if(!PROFILE.ads||!PROFILE.ads.length)return '';
 const items=PROFILE.ads.filter(a=>a&&a.image).map(a=>`<a class="ad-item" href="${a.link||'#'}" target="_blank" rel="noopener"><img src="${a.image}" alt="Ads"><div class="ad-caption">${a.caption||'Iklan'}</div></a>`).join('');
 if(!items)return '';
 return `<div class="adbox"><div class="ad-title"></div><div class="ad-list">${items}</div></div>`;
}
function drawPost(){const data=currentPost;updateSeo(data.code,data);const media=document.querySelector('.post-media');if(!data.images||!data.images.length){media.innerHTML=`<div style="padding:40px;text-align:center;color:var(--muted)">Gambar tidak ditemukan untuk ${data.code}</div>`}else{const img=data.images[currentIndex];media.innerHTML=`<img src="${img}" alt="${data.code}"><div class="counter">${currentIndex+1}/${data.images.length}</div><button class="arrow left" onclick="prevImg(event)">‹</button><button class="arrow right" onclick="nextImg(event)">›</button>`}document.querySelector('.caption').innerHTML=`<b>${PROFILE.username}</b> <b>CODE: ${data.code}</b><br>${data.title||''}<br><small style="color:var(--muted)">${data.studio||''}${data.actress?' • '+data.actress:''}</small><br><button class="video-btn" onclick="openVideo('${data.code}')">▷ TONTON VIDEO</button>`;document.querySelector('.comment').innerHTML=`Lihat komentar • tombol video mengikuti CODE <b>${data.code}</b>`; const oldAd=document.querySelector('.adbox'); if(oldAd)oldAd.remove(); document.querySelector('.post').insertAdjacentHTML('beforeend', renderAds())}
function nextImg(e){e&&e.stopPropagation();if(!currentPost)return;if(!currentPost.images.length)return;currentIndex=(currentIndex+1)%currentPost.images.length;drawPost()}
function prevImg(e){e&&e.stopPropagation();if(!currentPost)return;if(!currentPost.images.length)return;currentIndex=(currentIndex-1+currentPost.images.length)%currentPost.images.length;drawPost()}
async function openVideo(code){const modal=document.getElementById('videoModal');const wrap=document.getElementById('embedWrap');document.getElementById('videoTitle').textContent='Video '+normalizeCode(code);wrap.innerHTML='<div class="loader" style="margin:60px auto"></div>';modal.classList.add('show');let src='';try{const r=await fetch(api('/embed?code='+encodeURIComponent(normalizeCode(code))));if(r.ok){const j=await r.json();src=j.embed||j.url||''}}catch(e){} if(!src)src='about:blank';wrap.innerHTML=`<iframe allowfullscreen src="${src}"></iframe>`}
function closeVideo(){document.getElementById('videoModal').classList.remove('show');document.getElementById('embedWrap').innerHTML=''}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.style.display='block';clearTimeout(window.__toast);window.__toast=setTimeout(()=>el.style.display='none',1800)}
window.addEventListener('popstate',route);document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextImg(); if(e.key==='ArrowLeft')prevImg(); if(e.key==='Escape'){closeVideo();document.getElementById('drawer').classList.remove('show')}});setMeta();route();
</script>
